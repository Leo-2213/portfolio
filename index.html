/* ─── HOOKS ─────────────────────────────────────────────────── */
function useInView(options = {}) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.15, ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

function useActiveSection() {
  const [active, setActive] = useState("hero");
  useEffect(() => {
    const sections = document.querySelectorAll("section[id]");
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { threshold: 0.4 });
    sections.forEach(s => obs.observe(s));
    return () => obs.disconnect();
  }, []);
  return active;
}

function useTyping(words, speed = 80, pause = 1800) {
  const [text, setText] = useState("");
  const [wordIdx, setWordIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const word = words[wordIdx];
    const delay = deleting ? speed / 2 : charIdx === word.length ? pause : speed;
    const t = setTimeout(() => {
      if (!deleting && charIdx < word.length) {
        setText(word.slice(0, charIdx + 1));
        setCharIdx(c => c + 1);
      } else if (!deleting && charIdx === word.length) {
        setDeleting(true);
      } else if (deleting && charIdx > 0) {
        setText(word.slice(0, charIdx - 1));
        setCharIdx(c => c - 1);
      } else {
        setDeleting(false);
        setWordIdx(i => (i + 1) % words.length);
      }
    }, delay);
    return () => clearTimeout(t);
  }, [text, deleting, charIdx, wordIdx]);
  return text;
}

/* ─── PARTICLE CANVAS ──────────────────────────────────────── */
function ParticleCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    let W, H, particles = [], raf;
    const N = 60;

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    for (let i = 0; i < N; i++) {
      particles.push({
        x: Math.random() * 1920,
        y: Math.random() * 1080,
        r: Math.random() * 1.5 + 0.3,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        a: Math.random() * 0.5 + 0.1
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (let p of particles) {
        p.x = (p.x + p.vx + W) % W;
        p.y = (p.y + p.vy + H) % H;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,191,${p.a})`;
        ctx.fill();
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0,229,191,${0.08 * (1 - d/120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => { window.removeEventListener("resize", resize); cancelAnimationFrame(raf); };
  }, []);
  return <canvas ref={canvasRef} style={{ position:"absolute", inset:0, width:"100%", height:"100%", zIndex:0 }} />;
}

function Contact() {
  const [ref, inView] = useInView();
  const [form, setForm] = useState({ name:"", email:"", message:"" });
  const [status, setStatus] = useState("idle"); // idle | sending | success | error

  const handleSubmit = async () => {
    if (!form.name || !form.email || !form.message) {
      setStatus("error_fields");
      return;
    }
    setStatus("sending");
    try {
      await emailjs.send(
        EMAILJS_SERVICE_ID,
        EMAILJS_TEMPLATE_ID,
        {
          from_name:    form.name,
          from_email:   form.email,
          message:      form.message,
          to_name:      "Abhijeet",
          reply_to:     form.email,
        },
        EMAILJS_PUBLIC_KEY
      );
      setStatus("success");
      setForm({ name:"", email:"", message:"" });
      setTimeout(() => setStatus("idle"), 5000);
    } catch (err) {
      console.error("EmailJS error:", err);
      setStatus("error");
      setTimeout(() => setStatus("idle"), 4000);
    }
  };

  return (
    <section id="contact" className="section" style={{ background:"var(--bg2)" }} ref={ref}>
      <div className="max-w-6xl mx-auto px-6">
        <div className={`reveal ${inView?"visible":""}`}>
          <div className="section-num mb-2">06 / contact</div>
          <h2 className="font-display" style={{ fontSize:"clamp(2rem,4vw,3rem)", fontWeight:800 }}>
            Let's <span style={{ color:"var(--accent)" }}>Connect</span>

        <div className="glow-line mt-6 mb-12" />

        <div className="grid md:grid-cols-2 gap-12">
          {/* Left info */}
          <div className={`reveal-left ${inView?"visible":""}`}>
            <p style={{ color:"var(--muted)", fontSize:"0.9rem", lineHeight:1.85, marginBottom:32 }}>
              Open to full-time opportunities, collaborations, and interesting backend challenges.
              Don't hesitate to reach out — I'd love to hear from you.
            </p>

            {[
              { icon: (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>

              { icon: (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.37V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zm1.78 13.02H3.56V9h3.56v11.45zM22.22 0H1.77C.8 0 0 .77 0 1.72v20.56C0 23.23.8 24 1.77 24h20.44c.98 0 1.79-.77 1.79-1.72V1.72C24 .77 23.2 0 22.22 0z"/>
                  </svg>
                ), label:"LinkedIn", value: "Abhijeet Atmapoojya", href: DATA.linkedin },
              { icon: (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.74-1.33-1.74-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
                  </svg>
                ), label:"GitHub", value: "github.com/abhijeet", href: DATA.github },
                { icon: (
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.1.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.74-1.33-1.74-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                    ), label:"Leetcode", value: "https://leetcode.com/abhijeet", href: DATA.leetcode }
            ].map(c => (
              <a key={c.label} href={c.href} target="_blank" rel="noopener"
                 className="glass card-hover flex items-center gap-4 mb-4"
                 style={{ borderRadius:10, padding:"14px 20px", textDecoration:"none",
                          transition:"border-color 0.2s, transform 0.2s, box-shadow 0.2s" }}>
                <div style={{ width:36, height:36, borderRadius:8, background:"rgba(0,229,191,0.1)",
                              display:"flex", alignItems:"center", justifyContent:"center", color:"var(--accent)" }}>
                  {c.icon}
                </div>
                <div>
                  <div style={{ fontSize:"0.65rem", color:"var(--muted)", letterSpacing:"0.1em", textTransform:"uppercase" }}>{c.label}</div>
                  <div style={{ fontSize:"0.83rem", color:"var(--text)", marginTop:2 }}>{c.value}</div>
                </div>
                <span style={{ marginLeft:"auto", color:"var(--muted)", fontSize:"0.9rem" }}>›</span>
              </a>
            ))}
          </div>

          {/* Right form */}
          <div className={`reveal-right ${inView?"visible":""}`}>
            <div className="glass" style={{ borderRadius:12, padding:28 }}>
              <div className="section-num mb-5">send a message</div>

              {/* ── Status banners ── */}
              {status === "success" && (
                <div style={{ padding:"12px 16px", borderRadius:8, marginBottom:16, fontSize:"0.82rem",
                              background:"rgba(0,229,191,0.1)", border:"1px solid rgba(0,229,191,0.3)", color:"var(--accent)",
                              display:"flex", alignItems:"center", gap:8 }}>
                  <span>✓</span> Message sent! I'll get back to you soon.
                </div>
              )}
              {status === "error" && (
                <div style={{ padding:"12px 16px", borderRadius:8, marginBottom:16, fontSize:"0.82rem",
                              background:"rgba(255,107,53,0.08)", border:"1px solid rgba(255,107,53,0.3)", color:"var(--accent2)",
                              display:"flex", alignItems:"center", gap:8 }}>
                  <span>✕</span> Something went wrong. Please email me directly.
                </div>
              )}
              {status === "error_fields" && (
                <div style={{ padding:"12px 16px", borderRadius:8, marginBottom:16, fontSize:"0.82rem",
                              background:"rgba(255,107,53,0.08)", border:"1px solid rgba(255,107,53,0.3)", color:"var(--accent2)",
                              display:"flex", alignItems:"center", gap:8 }}>
                  <span>⚠</span> Please fill in all fields before sending.
                </div>
              )}

              <div className="mb-4">
                <label style={{ fontSize:"0.7rem", color:"var(--muted)", letterSpacing:"0.1em",
                                 textTransform:"uppercase", display:"block", marginBottom:8 }}>Name</label>
                <input className="form-input" placeholder="Your name"
                       value={form.name} onChange={e => setForm(f=>({...f, name:e.target.value}))}
                       disabled={status === "sending"} />
              </div>
              <div className="mb-4">
                <label style={{ fontSize:"0.7rem", color:"var(--muted)", letterSpacing:"0.1em",
                                 textTransform:"uppercase", display:"block", marginBottom:8 }}>Email</label>
                <input className="form-input" type="email" placeholder="your@email.com"
                       value={form.email} onChange={e => setForm(f=>({...f, email:e.target.value}))}
                       disabled={status === "sending"} />
              </div>
              <div className="mb-6">
                <label style={{ fontSize:"0.7rem", color:"var(--muted)", letterSpacing:"0.1em",
                                 textTransform:"uppercase", display:"block", marginBottom:8 }}>Message</label>
                <textarea className="form-input" placeholder="Tell me about your project or opportunity..."
                          value={form.message} onChange={e => setForm(f=>({...f, message:e.target.value}))}
                          disabled={status === "sending"} />
              </div>
              <button className="btn-primary" onClick={handleSubmit}
                      disabled={status === "sending"}
                      style={{ width:"100%", justifyContent:"center",
                               opacity: status === "sending" ? 0.7 : 1,
                               cursor: status === "sending" ? "not-allowed" : "pointer" }}>
                {status === "sending" ? (
                  <>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
                         style={{ animation:"spin-slow 1s linear infinite" }}>
                      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                    </svg>
                    Sending…
                  </>
                ) : (
                  <>
                    Send Message
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                  </>
                )}
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

    <footer style={{ background:"var(--bg)", borderTop:"1px solid var(--border)", padding:"32px 24px", position:"relative", zIndex:2 }}>
      <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">

          Bengaluru, India 🇮🇳
        </div>
      </div>

  );
}

/* ─── CURSOR ─────────────────────────────────────────────────── */
function CursorGlow() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const move = (e) => {
      el.style.left = e.clientX + "px";
      el.style.top = e.clientY + "px";
    };
    window.addEventListener("mousemove", move);
    return () => window.removeEventListener("mousemove", move);
  }, []);
  return <div className="cursor-glow" ref={ref} />;
}

/* ─── APP ────────────────────────────────────────────────────── */
function App() {
  const [theme, setTheme] = useState("dark");
  useEffect(() => {
    document.body.setAttribute("data-theme", theme);
  }, [theme]);

  return (
    <>
      <CursorGlow />
      <Navbar theme={theme} setTheme={setTheme} />
      <main>
        <Hero />
        <About />
        <Experience />
        <Skills />
        <Projects />
        <Education />
        <Contact />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
